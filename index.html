<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aarthik Udaan · Content Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --gold:    #E8952A;
  --gold-lt: #F5C36A;
  --gold-dk: #B86E10;
  --navy:    #1B2A6B;
  --teal:    #6DBFBF;
  --teal-lt: #A8DEDE;
  --teal-bg: #C8EAEA;
  --teal-dk: #3A8F8F;
  --purple:  #5B3FA0;
  --off:     #F7F5F0;
  --mid:     #E8E4DA;
  --text:    #1a1a2e;
  --muted:   #6b6b8a;
}

html, body { height:100%; font-family:'Poppins',sans-serif; background:#0f0f1e; color:#e0e0e0; overflow:hidden; }

.app { display:flex; height:100vh; }

/* ── SIDEBAR ── */
.sidebar {
  width:300px; min-width:300px;
  background:#12122a;
  border-right:1px solid rgba(255,255,255,.08);
  display:flex; flex-direction:column; overflow:hidden;
}

.sidebar-header {
  padding:18px 20px 14px;
  border-bottom:1px solid rgba(255,255,255,.08);
  display:flex; align-items:center; gap:10px;
}
.sidebar-header .brand { font-family:'Playfair Display',serif; font-size:15px; font-weight:900; color:var(--gold); letter-spacing:1px; }
.sidebar-header .sub   { font-size:9px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-top:1px; }

.tmpl-section { padding:14px 20px; border-bottom:1px solid rgba(255,255,255,.08); }
.tmpl-section > .sec-label { font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--teal-lt); display:block; margin-bottom:10px; }

.tmpl-picker { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.tmpl-btn {
  background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.09);
  border-radius:8px; padding:8px 6px;
  font-family:'Poppins',sans-serif; font-size:11px; font-weight:600;
  color:rgba(255,255,255,.5); cursor:pointer; transition:all .18s; text-align:center;
}
.tmpl-btn:hover  { border-color:var(--gold); color:var(--gold-lt); }
.tmpl-btn.active { background:rgba(232,149,42,.14); border-color:var(--gold); color:var(--gold); }

.fields-wrap { flex:1; overflow-y:auto; padding:14px 20px; }
.fields-wrap::-webkit-scrollbar { width:3px; }
.fields-wrap::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:2px; }

.field-group { margin-bottom:16px; }
.field-group label { display:block; font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-bottom:5px; }
.field-group input,
.field-group textarea,
.field-group select {
  width:100%; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.11);
  border-radius:7px; padding:7px 11px;
  font-family:'Poppins',sans-serif; font-size:12px; color:#ddd; outline:none;
  transition:border-color .18s; resize:vertical;
}
.field-group input:focus,
.field-group textarea:focus,
.field-group select:focus { border-color:var(--gold); }
.field-group select option { background:#1a1a2e; }

.divider-lbl {
  font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
  color:var(--teal); margin:14px 0 9px;
  padding-bottom:6px; border-bottom:1px solid rgba(109,191,191,.2);
}

.sidebar-footer { padding:14px 20px; border-top:1px solid rgba(255,255,255,.08); display:flex; flex-direction:column; gap:8px; }

.size-row { display:flex; gap:5px; }
.size-btn {
  flex:1; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.09);
  border-radius:6px; padding:5px 3px;
  font-family:'Poppins',sans-serif; font-size:9px; font-weight:600;
  color:rgba(255,255,255,.4); cursor:pointer; transition:all .18s; text-align:center;
}
.size-btn.active { border-color:var(--teal); color:var(--teal); background:rgba(109,191,191,.09); }

.btn-dl {
  background:linear-gradient(135deg,var(--gold),var(--gold-dk)); border:none;
  border-radius:10px; padding:11px; width:100%;
  font-family:'Poppins',sans-serif; font-size:12px; font-weight:700;
  color:#fff; cursor:pointer; letter-spacing:1px; text-transform:uppercase;
  transition:opacity .18s;
}
.btn-dl:hover   { opacity:.9; }
.btn-dl:disabled { opacity:.45; cursor:not-allowed; }

/* ── PREVIEW ── */
.preview-area {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:#0a0a18; padding:24px; gap:12px; overflow:auto;
}
.preview-lbl { font-size:9px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,.18); }

.canvas-scaler { box-shadow:0 20px 70px rgba(0,0,0,.7); border-radius:3px; position:relative; overflow:hidden; }

/* ── INFOGRAPHIC INTERNALS ── */
#infographic {
  width:1080px; height:1080px;
  transform-origin:top left;
  background:#F7F5F0;
  position:relative; overflow:hidden;
  font-family:'Poppins',sans-serif;
}
#infographic * { box-sizing:border-box; }

.ig-logo-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:26px 40px 22px; background:var(--navy); position:relative; z-index:2;
}
.ig-logo-left { display:flex; align-items:center; gap:14px; }
.ig-brand-name { font-family:'Playfair Display',serif; font-size:20px; font-weight:900; color:var(--gold-lt); letter-spacing:1px; }
.ig-brand-sub  { font-size:9px; font-weight:500; color:rgba(255,255,255,.35); letter-spacing:2px; text-transform:uppercase; margin-top:2px; }
.ig-handle     { font-size:13px; font-weight:600; color:var(--teal-lt); letter-spacing:1px; }

.ig-watermark {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%) rotate(-25deg);
  font-family:'Playfair Display',serif; font-size:80px; font-weight:900;
  color:rgba(91,63,160,.07); white-space:nowrap;
  pointer-events:none; letter-spacing:6px; z-index:1;
}

.ig-chip {
  display:inline-flex; align-items:center; gap:5px;
  padding:6px 16px; border-radius:20px;
  font-size:12px; font-weight:700; letter-spacing:.5px;
}

.ig-headline {
  font-family:'Playfair Display',serif; font-weight:900;
  color:var(--navy); line-height:1.15;
}

.ig-sub { font-size:16px; font-weight:400; color:var(--muted); line-height:1.55; }

.ig-panel {
  background:rgba(109,191,191,.17); border:1.5px solid rgba(109,191,191,.42);
  border-radius:13px; padding:20px 22px 20px 26px; position:relative;
}
.ig-panel::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:5px;
  background:linear-gradient(180deg,var(--gold),var(--teal)); border-radius:5px 0 0 5px;
}
.ig-panel-title { font-family:'Playfair Display',serif; font-size:16px; font-weight:700; color:var(--navy); margin-bottom:10px; }

.ig-bullet { display:flex; gap:9px; font-size:14px; color:#2a3a6b; line-height:1.5; margin-top:7px; }
.ig-bullet::before { content:'→'; color:var(--gold); font-weight:700; flex-shrink:0; }

.ig-takeaway { background:var(--navy); padding:18px 40px; display:flex; align-items:center; gap:14px; }
.ig-takeaway-label { font-size:9px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--gold); white-space:nowrap; }
.ig-takeaway-text  { font-size:15px; font-weight:600; color:#fff; line-height:1.45; }

.ig-footer {
  padding:14px 40px; background:var(--navy);
  display:flex; justify-content:space-between; align-items:center; position:relative;
}
.ig-footer-dots {
  position:absolute; left:40px; right:40px; top:0; height:6px;
  background-image:radial-gradient(circle,var(--gold) 2px,transparent 2px);
  background-size:12px 6px; opacity:.65;
}
.ig-footer-handle { font-size:13px; font-weight:600; color:var(--teal-lt); }
.ig-footer-brand  { font-size:9px; color:rgba(255,255,255,.28); letter-spacing:2px; text-transform:uppercase; }

.ig-gold-box { background:#FDF4E7; border:1.5px solid var(--gold-lt); border-radius:12px; padding:18px 22px; }
.ig-gold-box-title { font-family:'Playfair Display',serif; font-size:15px; font-weight:700; color:#7A4800; margin-bottom:8px; }
.ig-gold-box-text  { font-size:14px; color:#5a3800; line-height:1.55; }

.ig-big-num {
  font-family:'Playfair Display',serif; font-weight:900;
  background:linear-gradient(135deg,var(--gold),var(--gold-dk));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  line-height:1;
}

.ig-myth-box { background:#fff5f5; border-left:5px solid #e74c3c; border-radius:0 12px 12px 0; padding:18px 22px; }
.ig-myth-lbl { font-size:10px; font-weight:700; letter-spacing:3px; color:#e74c3c; text-transform:uppercase; margin-bottom:7px; }
.ig-myth-txt { font-size:16px; font-weight:600; color:#5a0a0a; line-height:1.45; font-style:italic; }

.ig-fact-box { background:#f0faf5; border-left:5px solid #2ecc71; border-radius:0 12px 12px 0; padding:18px 22px; }
.ig-fact-lbl { font-size:10px; font-weight:700; letter-spacing:3px; color:#1a7a45; text-transform:uppercase; margin-bottom:7px; }
.ig-fact-txt { font-size:16px; font-weight:600; color:#0a3d20; line-height:1.45; }

.ig-step { display:flex; align-items:flex-start; gap:16px; padding:12px 40px; }
.ig-step-num { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:15px; flex-shrink:0; }
.ig-step-txt { font-size:15px; color:var(--text); line-height:1.55; padding-top:5px; }

.ig-cmp-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.ig-cmp-col  { border-radius:12px; padding:20px; }
.ig-cmp-hdr  { font-size:11px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; margin-bottom:12px; padding-bottom:8px; border-bottom:2px solid currentColor; }
</style>
</head>

<div class="app">

  <!-- ══ SIDEBAR ══ -->
  <div class="sidebar">

    <div class="sidebar-header">

// ─── STATE ────────────────────────────────────────────────

let curSize  = { w:1080, h:1080 };

// ─── FIELD CONFIGS ────────────────────────────────────────
const CATS = ['💰 Tax Tips','📊 Mutual Funds','📈 Returns','⚡ STT','🏠 Real Estate','💼 ITR Filing','🔖 Budget 2025','💡 Finance 101','📉 Market Update','🧾 Section 80C','🏦 FD & Savings'];

const fieldDefs = {

    { id:'take', label:'Key Takeaway',   type:'in', ph:"One-liner summary…" },
  ],

    { id:'cat',  label:'Category Tag',   type:'sel', opts:CATS2 },
    { id:'ctx',  label:'Context Label',  type:'in', ph:"e.g. Indians filed ITR in FY2024" },
    { id:'num',  label:'The Big Number', type:'in', ph:"e.g. 7.5 Crore" },
    { id:'suf',  label:'Number Sub-label',type:'in',ph:"e.g. taxpayers · FY 2024" },

// ─── HELPERS ──────────────────────────────────────────────
function v(id) { const el = document.getElementById('f_'+id); return el ? el.value.trim() : ''; }

function bullet(txt, size) {
  if (!txt) return '';
  return `<div class="ig-bullet" style="font-size:${size||14}px;">${txt}</div>`;
}

function chipCSS(cat) {
  if (!cat) return 'background:#FDF4E7;color:#B86E10;';
  const c = cat.toLowerCase();
  if (c.includes('myth') || c.includes('stop') || c.includes('⚖️') || c.includes('🚫'))
    return 'background:#fff5f5;color:#c0392b;';
  if (c.includes('mutual') || c.includes('market') || c.includes('📊') || c.includes('↔️') || c.includes('did you'))
    return 'background:#E8ECF8;color:#1B2A6B;';
  if (c.includes('return') || c.includes('step') || c.includes('how') || c.includes('📈') || c.includes('📋') || c.includes('📝'))
    return 'background:#C8EAEA;color:#1E5F5F;';
  if (c.includes('⚡') || c.includes('stt') || c.includes('fast') || c.includes('📉'))
    return 'background:#1B2A6B;color:#F5C36A;';
  return 'background:#FDF4E7;color:#B86E10;';
}

// ─── TEMPLATE RENDERERS ───────────────────────────────────
const tmpl = {

  standard() {
    const cat  = v('cat') || '💰 Tax Tips';
    const hl   = v('hl')  || 'Your Headline Goes Here';
    const sub  = v('sub');
    const p1t  = v('p1t') || 'Key Points';
    const p2t  = v('p2t') || 'What To Do';

// ─── RENDER FIELDS ────────────────────────────────────────
function renderFields() {
  const wrap = document.getElementById('fieldsWrap');
  wrap.innerHTML = (fieldDefs[curTmpl] || []).map(f => {
    if (f.div) return `<div class="divider-lbl">${f.div}</div>`;
    if (f.type === 'sel') {
      const opts = f.opts.map(o => `<option>${o}</option>`).join('');
      return `<div class="field-group"><label>${f.label}</label><select id="f_${f.id}">${opts}</select></div>`;
    }
    if (f.type === 'ta') {
      return `<div class="field-group"><label>${f.label}</label><textarea id="f_${f.id}" rows="${f.rows||3}" placeholder="${f.ph||''}"></textarea></div>`;
    }
    return `<div class="field-group"><label>${f.label}</label><input type="text" id="f_${f.id}" placeholder="${f.ph||''}"></div>`;
  }).join('');

  wrap.querySelectorAll('input,textarea,select').forEach(el => {
    el.addEventListener('input',  render);
    el.addEventListener('change', render);
  });
}

// ─── RENDER PREVIEW ───────────────────────────────────────
function render() {
  const ig = document.getElementById('infographic');
  ig.style.width  = curSize.w + 'px';
  ig.style.height = curSize.h + 'px';
  ig.innerHTML    = (tmpl[curTmpl] || tmpl.standard)();
  scalePreview();
}

function scalePreview() {
  const area   = document.getElementById('previewArea');
  const scaler = document.getElementById('canvasScaler');
  const ig     = document.getElementById('infographic');
  const avW    = area.offsetWidth  - 60;
  const avH    = area.offsetHeight - 70;
  const scale  = Math.min(avW / curSize.w, avH / curSize.h, 0.7);
  ig.style.transform     = `scale(${scale})`;
  scaler.style.width     = (curSize.w * scale) + 'px';
  scaler.style.height    = (curSize.h * scale) + 'px';
}

// ─── SET TEMPLATE ─────────────────────────────────────────
function setTemplate(btn) {
  curTmpl = btn.dataset.tmpl;
  document.querySelectorAll('.tmpl-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderFields();
  render();
}

// ─── SET SIZE ─────────────────────────────────────────────
function setSize(key, btn) {
  const S = { square:{w:1080,h:1080}, portrait:{w:1080,h:1350}, landscape:{w:1200,h:630} };
  curSize = S[key];
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ─── DOWNLOAD PNG ─────────────────────────────────────────
async function downloadPNG() {
  const btn = document.getElementById('dlBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Generating…';

  const ig  = document.getElementById('infographic');
  const was = ig.style.transform;
  ig.style.transform = 'none';

  try {
    await document.fonts.ready;
    const canvas = await html2canvas(ig, {
      scale: 2,
      useCORS: true,
      allowTaint: true,
      backgroundColor: null,
      width:  curSize.w,
      height: curSize.h,
      logging: false,
    });
    const slug = (document.getElementById('f_hl')?.value || 'post')
      .toLowerCase().replace(/[^a-z0-9]+/g, '-').slice(0, 40);
    const a = document.createElement('a');
    a.download = `aarthik-udaan-${slug}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  } catch(e) {
    alert('Export failed. Try a different browser.\n' + e.message);
  }

  ig.style.transform = was;
  btn.disabled = false;
  btn.textContent = '⬇ Download PNG';
}

// ─── INIT ─────────────────────────────────────────────────
window.addEventListener('load', () => { renderFields(); render(); });
window.addEventListener('resize', scalePreview);
